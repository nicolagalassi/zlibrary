name: Aggiorna circolari

on:
  schedule:
    - cron: '0 4 * * *'  # ogni giorno alle 6:00 italiane (UTC+2 estate / UTC+1 inverno)
  workflow_dispatch:
  push:
    paths:
      - 'python/**'
      - '.github/workflows/update.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clona repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp

      - name: Esegui aggiornamento
        run: python python/aggiorna_circolari.py

      - name: Commit e push se ci sono modifiche
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add public/js/circolari.json
          git diff --cached --quiet || git commit -m "Aggiornamento automatico circolari"
          git push
